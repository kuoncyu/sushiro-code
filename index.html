<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>壽司郎問卷認證碼查詢器</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h2 {
            color: #d32f2f;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        select, input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box; /* 確保 padding 不會撐大寬度 */
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #d32f2f;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #b71c1c;
        }
        #result {
            margin-top: 25px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            min-height: 1.2em;
            padding: 10px;
            background: #fff3e0;
            border-radius: 5px;
            border: 1px dashed #ff9800;
            display: none; /* 預設隱藏 */
        }
        .note {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🍣 壽司郎認證碼查詢</h2>
    
    <div class="input-group">
        <label for="year">年份 (西元)</label>
        <select id="year">
            <option value="2026">2026</option>
            <option value="2025">2025</option>
            <option value="2024">2024</option>
            <option value="2023">2023</option>
            <option value="2022">2022</option>
        </select>
    </div>

    <div class="input-group">
        <label for="month">月份</label>
        <select id="month">
            <option value="1">1月</option>
            <option value="2">2月</option>
            <option value="3">3月</option>
            <option value="4">4月</option>
            <option value="5">5月</option>
            <option value="6">6月</option>
            <option value="7">7月</option>
            <option value="8">8月</option>
            <option value="9">9月</option>
            <option value="10">10月</option>
            <option value="11">11月</option>
            <option value="12">12月</option>
        </select>
    </div>

    <button onclick="findCode()">查詢序號</button>

    <div id="result"></div>
    
    <div class="note">
        ※ 資料來源：backpackers4u<br>
        ※ 認證碼為該月份通用，不分日期。<br>
        ※ 若查無資料，代表該月份尚未更新。
    </div>
</div>

<script>
    // 資料庫：整合自您提供的網站內容
    const data = {
        "2026": {
            "1": "88409"
        },
        "2025": {
            "12": "34652", "11": "26758", "10": "95721", "9": "66048",
            "8": "88577", "7": "15453", "6": "63832", "5": "34747",
            "4": "95343", "3": "72125", "2": "21179", "1": "53069"
        },
        "2024": {
            "12": "58182", "11": "64441", "10": "75313", "9": "50154",
            "8": "75679", "7": "74276", "6": "44050", "5": "11324",
            "4": "46619", "3": "47337", "2": "98989", "1": "46860"
        },
        "2023": {
            "12": "56237", "11": "91531", "10": "68567", "9": "76621",
            "8": "63224", "7": "80451", "6": "98260", "5": "82520",
            "4": "58230", "3": "99804", "2": "23607", "1": "41258"
        },
        "2022": {
            "11": "93637"
        }
    };

    function findCode() {
        const year = document.getElementById('year').value;
        const month = document.getElementById('month').value;
        const resultDiv = document.getElementById('result');

        if (data[year] && data[year][month]) {
            resultDiv.style.display = 'block';
            resultDiv.style.color = '#333';
            resultDiv.innerHTML = `📅 ${year}年${month}月<br>認證碼：<span style="color:#d32f2f; font-size:1.2em;">${data[year][month]}</span>`;
        } else {
            resultDiv.style.display = 'block';
            resultDiv.style.color = '#777';
            resultDiv.innerHTML = `查無 ${year}年${month}月 的資料。<br>(可能尚未更新或太久遠)`;
        }
    }
    
    // 初始化設定選單為當前時間
    window.onload = function() {
        const now = new Date();
        const currentYear = now.getFullYear().toString();
        const currentMonth = (now.getMonth() + 1).toString();
        
        const yearSelect = document.getElementById('year');
        if (yearSelect.querySelector(`option[value="${currentYear}"]`)) {
            yearSelect.value = currentYear;
        }
        
        document.getElementById('month').value = currentMonth;
    }
</script>

</body>
</html>
