<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>壽司郎認證碼 - 雙模強效版</title>
    <style>
        :root { --sushi: #e63946; --blue: #457b9d; }
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: var(--sushi); border-bottom: 2px solid var(--sushi); padding-bottom: 10px; }
        .status { font-size: 13px; color: #666; margin: 10px 0; padding: 10px; background: #eee; border-radius: 5px; min-height: 20px; }
        .tab-btn { padding: 8px 15px; cursor: pointer; border: none; background: #ddd; margin: 5px; border-radius: 5px; font-weight: bold; }
        .tab-btn.active { background: var(--blue); color: white; }
        .panel { display: none; margin-top: 15px; }
        .panel.active { display: block; }
        textarea { width: 100%; height: 80px; margin-top: 10px; border: 1px solid #ccc; border-radius: 5px; padding: 10px; box-sizing: border-box; }
        select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
        button { background: var(--sushi); color: white; font-weight: bold; border: none; cursor: pointer; }
        button:disabled { background: #ccc; }
        #result-box { margin-top: 20px; padding: 20px; border: 2px dashed #ffb703; border-radius: 10px; background: #fffcf2; display: none; }
        .code-val { font-size: 40px; color: var(--sushi); font-weight: bold; display: block; margin: 10px 0; letter-spacing: 5px; }
        .blog-link { display: block; margin-top: 10px; color: var(--blue); font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🍣 壽司郎代碼工具</h2>
    
    <div class="status" id="status">模式：自動掃描</div>

    <div style="margin-bottom: 15px;">
        <button class="tab-btn active" onclick="switchTab('auto', this)">自動掃描</button>
        <button class="tab-btn" onclick="switchTab('manual', this)">手動解析</button>
    </div>

    <div id="auto-panel" class="panel active">
        <button id="updateBtn" onclick="tryUpdate()">🔄 嘗試自動更新 (多重代理)</button>
        <a href="https://backpackers4u.pixnet.net/blog" target="_blank" class="blog-link">🔗 若失敗，請點此手動打開部落格</a>
    </div>

    <div id="manual-panel" class="panel">
        <p style="font-size: 13px; color: #555;">請複製部落格內文，直接貼在下方：</p>
        <textarea id="manualInput" placeholder="在此貼上複製的文字..."></textarea>
        <button onclick="parseManual()">⚡ 立即解析代碼</button>
    </div>

    <hr style="margin: 20px 0; border: 0.5px solid #eee;">

    <div style="text-align: left;">
        <label style="font-weight: bold;">選擇月份：</label>
        <select id="mSel" onchange="checkCode()">
            <option value="1">1月</option><option value="2">2月</option>
            <option value="3" selected>3月</option><option value="4">4月</option>
            <option value="5">5月</option><option value="6">6月</option>
            <option value="7">7月</option><option value="8">8月</option>
            <option value="9">9月</option><option value="10">10月</option>
            <option value="11">11月</option><option value="12">12月</option>
        </select>
    </div>

    <div id="result-box">
        <div id="res-title" style="font-weight:bold; color:#666;"></div>
        <span class="code-val" id="res-code">-----</span>
        <div style="font-size: 12px; color: #0077b6; cursor: pointer;" onclick="copyResult()">點擊複製序號</div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('sushi_db')) || {};

    function switchTab(mode, btn) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(mode + '-panel').classList.add('active');
        btn.classList.add('active');
        document.getElementById('status').innerText = "模式：" + (mode === 'auto' ? "自動掃描" : "手動解析");
    }

    // 萬能解析引擎
    function extractData(text) {
        const regex = /(202[4-7])\s*年?\s*(\d{1,2})\s*月[份]?.*?(\d{5})/g;
        let match;
        let count = 0;
        while ((match = regex.exec(text)) !== null) {
            const y = match[1], m = match[2], c = match[3];
            if (!db[y]) db[y] = {};
            db[y][m] = c;
            count++;
        }
        if (count > 0) {
            localStorage.setItem('sushi_db', JSON.stringify(db));
            checkCode();
        }
        return count;
    }

    function parseManual() {
        const input = document.getElementById('manualInput').value;
        const count = extractData(input);
        if (count > 0) {
            alert(`解析成功！新增 ${count} 筆代碼。`);
            document.getElementById('manualInput').value = "";
        } else {
            alert("在文字中找不到符合格式的代碼 (例如：2026年3月 12345)");
        }
    }

    function checkCode() {
        const m = document.getElementById('mSel').value;
        const y = "2026"; 
        const resBox = document.getElementById('result-box');
        if (db[y] && db[y][m]) {
            resBox.style.display = 'block';
            document.getElementById('res-title').innerText = `${y}年 ${m}月 序號`;
            document.getElementById('res-code').innerText = db[y][m];
        } else {
            resBox.style.display = 'none';
        }
    }

    // 多重 Proxy 嘗試
    async function tryUpdate() {
        const status = document.getElementById('status');
        const btn = document.getElementById('updateBtn');
        const proxies = [
            "https://api.allorigins.win/get?url=",
            "https://corsproxy.io/?",
            "https://thingproxy.freeboard.io/fetch/"
        ];
        
        btn.disabled = true;
        let success = false;

        for (let i = 0; i < proxies.length; i++) {
            status.innerText = `⏳ 正在嘗試連線方案 ${i+1}...`;
            try {
                const target = encodeURIComponent("https://backpackers4u.pixnet.net/blog");
                const res = await fetch(proxies[i] + (i === 1 ? target : encodeURIComponent("https://backpackers4u.pixnet.net/blog")));
                const data = await res.json();
                const html = data.contents || data; // 不同 proxy 回傳格式不同
                
                // 這裡簡化邏輯：直接從首頁初步抓取一次，並尋找文章網址
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, "text/html");
                const links = Array.from(doc.querySelectorAll('a'))
                    .map(a => a.href)
                    .filter(href => href && href.includes('/post/'));
                
                if (links.length > 0) {
                    // 抓取最新一篇
                    status.innerText = `📄 已連線，正在解析內文...`;
                    const artRes = await fetch(proxies[i] + encodeURIComponent(links[0]));
                    const artData = await artRes.json();
                    const count = extractData(artData.contents || artData);
                    if (count > 0) {
                        status.innerText = `✅ 更新成功！(方案 ${i+1})`;
                        success = true;
                        break;
                    }
                }
            } catch (e) {
                console.log(`方案 ${i+1} 失敗`);
            }
        }

        if (!success) {
            status.innerText = "❌ 自動掃描失敗，請改用「手動解析」。";
            status.style.color = "red";
        } else {
            status.style.color = "green";
        }
        btn.disabled = false;
    }

    function copyResult() {
        navigator.clipboard.writeText(document.getElementById('res-code').innerText);
        alert("已複製！");
    }

    window.onload = checkCode;
</script>

</body>
</html>
