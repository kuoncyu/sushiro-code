<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>壽司郎問卷認證碼查詢器 (Google雲端代理版)</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            max-height: 95vh;
            overflow-y: auto;
        }
        h2 {
            color: #d32f2f;
            margin-bottom: 20px;
            margin-top: 0;
        }
        .update-box {
            background-color: #e8f5e9;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #c8e6c9;
            text-align: left;
        }
        .update-box label {
            color: #2e7d32;
            font-size: 14px;
            font-weight: bold;
        }
        .update-box input {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border: 1px solid #a5d6a7;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .btn-update {
            background-color: #2e7d32;
            color: white;
            margin-top: 10px;
            padding: 10px;
            font-size: 16px;
        }
        .btn-update:hover { background-color: #1b5e20; }
        .btn-update:disabled { background-color: #a5d6a7; cursor: wait; }
        #update-status {
            font-size: 13px;
            color: #555;
            margin-top: 10px;
            min-height: 20px;
            font-weight: bold;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; transition: background 0.3s; font-weight: bold; }
        .btn-search { background-color: #d32f2f; color: white; margin-top: 10px; }
        .btn-search:hover { background-color: #b71c1c; }
        #result {
            margin-top: 25px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            min-height: 1.2em;
            padding: 15px;
            background: #fff3e0;
            border-radius: 5px;
            border: 1px dashed #ff9800;
            display: none; 
        }
        .note { margin-top: 20px; font-size: 12px; color: #888; text-align: left; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h2>🍣 壽司郎認證碼查詢</h2>

    <div class="update-box">
        <label for="articleUrl">💡 貼上文章網址，透過 Google 伺服器抓取：</label>
        <input type="text" id="articleUrl" placeholder="https://backpackers4u.pixnet.net/blog/post/...">
        <button id="updateBtn" class="btn-update" onclick="fetchWithGAS()">🚀 透過 Google 伺服器抓取</button>
        <div id="update-status"></div>
    </div>
    
    <div class="input-group">
        <label for="year">年份 (西元)</label>
        <select id="year">
            <option value="2026">2026</option>
            <option value="2025">2025</option>
            <option value="2024">2024</option>
        </select>
    </div>

    <div class="input-group">
        <label for="month">月份</label>
        <select id="month">
            <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
            <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
            <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
            <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
        </select>
    </div>

    <button class="btn-search" onclick="findCode()">🔍 查詢序號</button>

    <div id="result"></div>
    
    <div class="note">
        ※ 系統已升級：使用 Google Apps Script 雲端專屬伺服器代理，100% 防阻擋。<br>
        ※ 平時免連線即可查詢已記憶的代碼。
    </div>
</div>

<script>
    // ⚠️⚠️⚠️ 請將下方引號內的網址，替換成你剛剛在 Google 部署得到的 Web App URL！ ⚠️⚠️⚠️
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxmzOk2IOdo_YAsayt_eKwTkB8ghBvEu-aHXEWKenoainpMfzq71q2t64FP8nmcOJq6/exec"; 

    // 預設資料庫與 LocalStorage 記憶
    const defaultData = {
        "2026": { "1": "88409" },
        "2025": { "12": "34652", "11": "26758", "10": "95721" }
    };
    let data = JSON.parse(localStorage.getItem('sushi_gas_db')) || defaultData;

    function findCode() {
        const year = document.getElementById('year').value;
        const month = document.getElementById('month').value;
        const resultDiv = document.getElementById('result');

        if (data[year] && data[year][month]) {
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `📅 ${year}年${month}月<br>認證碼：<span style="color:#d32f2f; font-size:1.2em; letter-spacing:2px; cursor:pointer;" onclick="copyCode('${data[year][month]}')" title="點擊複製">${data[year][month]}</span><br><span style="font-size:12px; color:#007bff; font-weight:normal;">(點擊數字可複製)</span>`;
        } else {
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `<span style="font-size:16px; color:#777;">查無 ${year}年${month}月 的資料。<br>(請貼上網址更新)</span>`;
        }
    }

    function copyCode(code) {
        navigator.clipboard.writeText(code).then(() => alert("已複製代碼：" + code));
    }

    // 🚀 呼叫你的私人 Google 伺服器
    async function fetchWithGAS() {
        const urlInput = document.getElementById('articleUrl').value.trim();
        const statusDiv = document.getElementById('update-status');
        const btn = document.getElementById('updateBtn');

        if (!urlInput) {
            statusDiv.style.color = "#d32f2f";
            statusDiv.innerHTML = "❌ 請先貼上文章網址！";
            return;
        }

        if (GAS_WEB_APP_URL === "https://script.google.com/macros/s/AKfycbxmzOk2IOdo_YAsayt_eKwTkB8ghBvEu-aHXEWKenoainpMfzq71q2t64FP8nmcOJq6/exec") {
            statusDiv.style.color = "#d32f2f";
            statusDiv.innerHTML = "❌ 你忘記在程式碼第 167 行替換 Google Web App 網址了！";
            return;
        }

        btn.disabled = true;
        statusDiv.style.color = "#f57c00";
        statusDiv.innerHTML = "☁️ 正在呼叫 Google 伺服器前往抓取...";

        try {
            // 組合請求網址：你的GAS網址 + ?url=目標痞客邦網址
            const requestUrl = `${GAS_WEB_APP_URL}?url=${encodeURIComponent(urlInput)}`;
            
            const response = await fetch(requestUrl);
            const result = await response.json();

            if (!result.success) {
                throw new Error(result.error || "Google 伺服器回傳失敗");
            }

            statusDiv.innerHTML = "📄 Google 伺服器成功抓回網頁，正在解析...";

            // 將 HTML 轉為純文字
            let plainText = result.content.replace(/<[^>]+>/g, ' ').replace(/&[a-zA-Z0-9#]+;/g, ' ');

            // 尋找「台灣壽司郎 2026 3月份 認證碼 88409」
            const regex = /台灣壽司郎\s*(202[4-9])\s*年?\s*(\d{1,2})\s*月(?:份)?.*?(\d{5})/g;
            let match;
            let updateCount = 0;

            while ((match = regex.exec(plainText)) !== null) {
                const y = match[1], m = match[2], code = match[3];
                if (!data[y]) data[y] = {};
                data[y][m] = code;
                updateCount++;
                
                // 動態增加年份選單
                const yearSelect = document.getElementById('year');
                if (!yearSelect.querySelector(`option[value="${y}"]`)) {
                    const newOpt = document.createElement('option');
                    newOpt.value = y; newOpt.text = y;
                    yearSelect.insertBefore(newOpt, yearSelect.firstChild);
                }
            }

            if (updateCount > 0) {
                localStorage.setItem('sushi_gas_db', JSON.stringify(data));
                statusDiv.style.color = "#2e7d32";
                statusDiv.innerHTML = `✅ 成功！Google 伺服器已將 ${updateCount} 筆代碼送回，並存入記憶體。`;
                document.getElementById('articleUrl').value = "";
                findCode();
            } else {
                statusDiv.style.color = "#d32f2f";
                statusDiv.innerHTML = "⚠️ Google 伺服器成功抓到網頁，但文章內沒有符合的代碼格式。";
            }

        } catch (error) {
            console.error(error);
            statusDiv.style.color = "#d32f2f";
            statusDiv.innerHTML = `❌ 連線失敗：${error.message}`;
        } finally {
            btn.disabled = false;
        }
    }
    
    window.onload = function() {
        const now = new Date();
        const currentYear = now.getFullYear().toString();
        const currentMonth = (now.getMonth() + 1).toString();
        
        const yearSelect = document.getElementById('year');
        if (!yearSelect.querySelector(`option[value="${currentYear}"]`)) {
            const newOption = document.createElement('option');
            newOption.value = currentYear;
            newOption.text = currentYear;
            yearSelect.insertBefore(newOption, yearSelect.firstChild);
        }
        yearSelect.value = currentYear;
        document.getElementById('month').value = currentMonth;

        if (localStorage.getItem('sushi_gas_db')) {
            document.getElementById('update-status').innerHTML = "💡 系統已載入您上次透過 Google 抓取的代碼。";
        }
        findCode();
    }
</script>

</body>
</html>
