<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>壽司郎問卷認證碼查詢器 (智能追蹤版)</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h2 {
            color: #d32f2f;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
            font-weight: bold;
        }
        .btn-search {
            background-color: #d32f2f;
            color: white;
        }
        .btn-search:hover { background-color: #b71c1c; }
        
        .btn-update {
            background-color: #1976d2;
            color: white;
            font-size: 16px;
        }
        .btn-update:hover { background-color: #1565c0; }
        .btn-update:disabled {
            background-color: #90caf9;
            cursor: not-allowed;
        }

        #result {
            margin-top: 25px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            min-height: 1.2em;
            padding: 15px;
            background: #fff3e0;
            border-radius: 5px;
            border: 1px dashed #ff9800;
            display: none;
        }
        
        #statusMessage {
            margin-top: 10px;
            font-size: 13px;
            color: #2e7d32;
            font-weight: bold;
            min-height: 35px;
            line-height: 1.4;
        }

        .note {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
            text-align: left;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🍣 壽司郎認證碼查詢</h2>
    
    <button class="btn-update" id="updateBtn" onclick="fetchLatestData()">🔄 自動尋找並更新最新代碼</button>
    <div id="statusMessage"></div>

    <div class="input-group" style="margin-top: 10px;">
        <label for="year">年份 (西元)</label>
        <select id="year">
            <option value="2026">2026</option>
            <option value="2025">2025</option>
            <option value="2024">2024</option>
            <option value="2023">2023</option>
        </select>
    </div>

    <div class="input-group">
        <label for="month">月份</label>
        <select id="month">
            <option value="1">1月</option>
            <option value="2">2月</option>
            <option value="3">3月</option>
            <option value="4">4月</option>
            <option value="5">5月</option>
            <option value="6">6月</option>
            <option value="7">7月</option>
            <option value="8">8月</option>
            <option value="9">9月</option>
            <option value="10">10月</option>
            <option value="11">11月</option>
            <option value="12">12月</option>
        </select>
    </div>

    <button class="btn-search" onclick="findCode()">🔍 查詢序號</button>

    <div id="result"></div>
    
    <div class="note">
        ※ 資料來源：backpackers4u 部落格首頁<br>
        ※ 系統會自動前往該部落格首頁尋找最新的壽司郎文章，並解析內文以取得最新代碼。
    </div>
</div>

<script>
    // 預設的本地資料庫 (作為基底)
    const sushiroData = {
        "2026": { "1": "88409" },
        "2025": { "12": "34652", "11": "26758", "10": "95721", "9": "66048", "8": "88577", "7": "15453", "6": "63832", "5": "34747", "4": "95343", "3": "72125", "2": "21179", "1": "53069" },
        "2024": { "12": "58182", "11": "64441", "10": "75313", "9": "50154", "8": "75679", "7": "74276", "6": "44050", "5": "11324", "4": "46619", "3": "47337", "2": "98989", "1": "46860" }
    };

    // 查詢序號功能
    function findCode() {
        const year = document.getElementById('year').value;
        const month = document.getElementById('month').value;
        const resultDiv = document.getElementById('result');

        if (sushiroData[year] && sushiroData[year][month]) {
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `📅 ${year}年${month}月<br>認證碼：<span style="color:#d32f2f; font-size:1.2em;">${sushiroData[year][month]}</span>`;
        } else {
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `<span style="color:#777; font-size: 16px;">查無 ${year}年${month}月 的資料。<br>請點擊上方的「自動更新」按鈕抓取。</span>`;
        }
    }

    // 自動抓取最新資料功能 (兩階段抓取)
    async function fetchLatestData() {
        const btn = document.getElementById('updateBtn');
        const statusMsg = document.getElementById('statusMessage');
        const blogHomeUrl = 'https://backpackers4u.pixnet.net/blog';
        
        btn.disabled = true;
        btn.innerText = "⏳ 執行中，請稍候...";
        statusMsg.style.color = "#f57c00";

        try {
            // 【第一階段】：去部落格首頁尋找最新的文章連結
            statusMsg.innerText = "正在掃描部落格首頁，尋找最新文章...";
            const proxyHomeUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(blogHomeUrl)}`;
            const homeResponse = await fetch(proxyHomeUrl);
            if (!homeResponse.ok) throw new Error('首頁讀取失敗');
            
            const homeData = await homeResponse.json();
            
            // 將字串轉為 HTML DOM 方便搜尋
            const parser = new DOMParser();
            const doc = parser.parseFromString(homeData.contents, 'text/html');
            const links = doc.querySelectorAll('a');
            
            let targetArticleUrl = '';
            
            // 尋找包含「壽司郎」字眼的連結
            for (let a of links) {
                if (a.textContent.includes('壽司郎') && a.getAttribute('href') && a.getAttribute('href').includes('/blog/post/')) {
                    const href = a.getAttribute('href');
                    targetArticleUrl = href.startsWith('http') ? href : 'https://backpackers4u.pixnet.net' + href;
                    break; // 找到第一篇(最新的)就跳出
                }
            }

            // 如果首頁找不到，就退回使用已知的文章網址
            if (!targetArticleUrl) {
                statusMsg.innerText = "首頁找不到新文章，嘗試讀取原文章...";
                targetArticleUrl = 'https://backpackers4u.pixnet.net/blog/post/221333427';
            } else {
                statusMsg.innerText = "找到最新文章！正在解析代碼內容...";
            }

            // 【第二階段】：去找到的那篇文章裡面抓取代碼
            const proxyArticleUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetArticleUrl)}`;
            const articleResponse = await fetch(proxyArticleUrl);
            if (!articleResponse.ok) throw new Error('文章內容讀取失敗');
            
            const articleData = await articleResponse.json();
            const htmlContent = articleData.contents;

            // 正規表達式：找出「台灣壽司郎 20xx年 x月 認證碼 xxxxx」的格式
            const regex = /台灣壽司郎\s*(20\d{2})\s*年?\s*(\d{1,2})\s*月(?:份)?\s*(?:認證碼)?\s*(\d{5})/g;
            let match;
            let foundCount = 0;

            while ((match = regex.exec(htmlContent)) !== null) {
                const year = match[1];
                const month = match[2];
                const code = match[3];

                if (!sushiroData[year]) {
                    sushiroData[year] = {};
                }
                
                sushiroData[year][month] = code;
                foundCount++;
                
                // 動態增加下拉選單的年份
                const yearSelect = document.getElementById('year');
                if (!yearSelect.querySelector(`option[value="${year}"]`)) {
                    const newOption = document.createElement('option');
                    newOption.value = year;
                    newOption.text = year;
                    yearSelect.insertBefore(newOption, yearSelect.firstChild);
                }
            }

            if (foundCount > 0) {
                statusMsg.style.color = "#2e7d32";
                statusMsg.innerText = `✅ 更新成功！共從最新文章解析出 ${foundCount} 筆代碼資料。`;
                findCode(); // 自動重新查詢
            } else {
                statusMsg.style.color = "#d32f2f";
                statusMsg.innerText = "⚠️ 抓取成功，但文章內沒有找到符合格式的代碼。";
            }

        } catch (error) {
            console.error("Fetch error: ", error);
            statusMsg.style.color = "#d32f2f";
            statusMsg.innerText = "❌ 更新失敗，可能是網路問題或代理伺服器忙碌，請稍後再試。";
        } finally {
            btn.disabled = false;
            btn.innerText = "🔄 自動尋找並更新最新代碼";
            
            setTimeout(() => {
                if(statusMsg.innerText.includes("更新成功")) {
                    statusMsg.innerText = "";
                }
            }, 5000);
        }
    }
    
    // 初始化設定選單為當前時間
    window.onload = function() {
        const now = new Date();
        const currentYear = now.getFullYear().toString();
        const currentMonth = (now.getMonth() + 1).toString();
        
        const yearSelect = document.getElementById('year');
        if (yearSelect.querySelector(`option[value="${currentYear}"]`)) {
            yearSelect.value = currentYear;
        }
        document.getElementById('month').value = currentMonth;
        
        findCode();
    }
</script>

</body>
</html>
